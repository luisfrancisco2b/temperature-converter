<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Converter Temperatura</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <main class="container">
      <h1>Conversor de Temperatura</h1>
      <p>Converta Celsius para Fahrenheit</p>

      <div class="converter">
        <label id="fontSize" class="label" for="celsius"
          >Temperatura em Celsius:</label
        >
        <input type="number" id="celsius" placeholder="Digite a temperatura" />

        <button class="button" onclick="converterTemperatura()">
          Converter
        </button>

        <div class="resultado">
          <label class="label" for="fahrenheit" id="fontSize"
            >Temperatura em Fahrenheit:</label
          >
          <input type="text" id="fahrenheit" readonly />
        </div>
      </div>
    </main>

    <script src="js/js.js" defer></script>
  </body>
</html>
